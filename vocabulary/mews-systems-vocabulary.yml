    description: 'Connector API — Customers and Companies. 39 operations. Lead operation: Get All Addresses'
    toolCount: 39
    domains:
    - Customers and Companies
  - name: Mews Connector API — Operations and Messaging
    file: capabilities/connector-operations.yaml
