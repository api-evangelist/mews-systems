    placement: JSON request body
    notes: ClientToken identifies the partner application; AccessToken authorises against a property (enterprise); Portfolio Access Tokens grant multi-property access.
capability:
  workflows:
  - name: Mews Booking Engine API
    file: capabilities/booking-engine.yaml
    description: 'Booking Engine API — Mews Booking Engine API. 20 operations. Lead operation: Get Availability'
    toolCount: 20
    domains:
    - Booking-Engine
  - name: Mews Connector API — Bills and Accounting
    file: capabilities/connector-billing.yaml
    description: 'Connector API — Bills and Accounting. 24 operations. Lead operation: Get All Accounting Categories'
    toolCount: 24
    domains:
    - Bills and Accounting
  - name: Mews Connector API — Enterprise Configuration
    file: capabilities/connector-configuration.yaml
    description: 'Connector API — Enterprise Configuration. 8 operations. Lead operation: Get Configuration'
    toolCount: 8
    domains:
    - Enterprise Configuration
  - name: Mews Connector API — Customers and Companies
