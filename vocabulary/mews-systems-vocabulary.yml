  personas:
  - id: integration-partner
    name: Integration Partner Developer
    description: Builds certified Mews Marketplace integrations against the Connector API.
  - id: booking-engine-developer
    name: Booking Engine Developer
    description: Builds guest-facing direct-booking flows on the Distributor/Booking Engine API.
  - id: pos-vendor
    name: POS Vendor
    description: Integrates restaurant and retail point-of-sale with guest folios.
  - id: revenue-analyst
    name: Revenue and BI Analyst
    description: Pulls reservation, billing, and payment data into BI and revenue tools.
