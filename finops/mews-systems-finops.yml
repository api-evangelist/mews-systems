principles:
- name: Visibility
  description: Pull reservation, bill, payment, and accounting data via the Connector API (bills, payments, accountingItems, ledgerBalances) and Mews Business Intelligence dashboards to see revenue and cost consumption per property.
- name: Allocation
  description: Attribute spend by enterprise (property) and department using the Connector API enterprise/department resources and AccessToken-per-property scoping; group multi-brand portfolios via Portfolio Access Tokens.
- name: Optimization
  description: Right-size the subscription tier (Essentials vs Advanced vs Enterprise), enable only the add-on modules (RMS, POS) a property uses, and reconcile payment processing fees against transaction volume reported through the payments API.
- name: Accountability
  description: Assign per-property owners for the Mews subscription and payment-processing line items, review monthly invoices against BI exports, and monitor add-on module adoption across the portfolio.
