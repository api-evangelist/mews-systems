info:
  title: Mews Connector API — Point of Sale Outlets
  description: General-purpose API that enables partners of Mews to access data and services in Mews Operations This modular spec covers the Point of Sale Outlets domain (3 operations).
  termsOfService: https://www.mews.com/en/terms-conditions/partners
  contact:
    name: Partner success
    email: partnersuccess@mews.com
  version: v1
  x-generated-from: documentation
  x-source-url: https://api.mews.com/Swagger/connector/swagger.json
  x-last-validated: '2026-06-02'
paths:
  /api/connector/v1/outletBills/add:
    post:
      tags:
      - Outlet bills
      summary: Mews Add Outlet Bills
      description: Adds new outlet bills with their items.
      operationId: outletBills_add
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOutletBillsParameters'
            example:
              ClientToken: E0D439EE522F44368DC78E1BFB03710C-D24FB11DBE31D4621C4817E028D9E1D
              AccessToken: C66EF7B239D24632943D115EDE9CB810-EA00F8FD8294692C940F6B5A8F9453D
              Client: Sample Client 1.0.0
              Bills:
              - OutletId: 7700469f-7667-4ebd-a1c0-10380afc9bd0
                Number: '1257'
                ClosedUtc: '2017-01-01T00:00:00Z'
                Items:
                - Type: Payment
                  Name: Cash payment
                  UnitCount: 1
                  UnitAmount:
                    Currency: GBP
                    GrossValue: -25
                    TaxCodes:
                    - UK-S
                  ConsumedUtc: '2017-01-01T00:00:00Z'
                  ExternalIdentifier: PaymentReference123
                - Type: Revenue
                  Name: Beer
                  UnitCount: 10
                  UnitAmount:
                    Currency: GBP
                    GrossValue: 2.5
                    TaxCodes:
                    - UK-S
                  ConsumedUtc: '2017-01-01T00:00:00Z'
                  AccountingCategoryId:
      responses:
