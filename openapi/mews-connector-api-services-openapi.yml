                CategoryAvailabilities:
                - Availabilities:
                  - 6
                  - 7
                  - 5
                  'Adjustments ':
                  - 0
                  - 1
                  - -1
                  CategoryId: 773d5e42-de1e-43a0-9ce6-f940faf2303f
