      type: object
      properties:
        Corporate:
          type: boolean
          description: Corporate.
          example: true
        Internal:
          type: boolean
          description: Internal.
          example: true
        Private:
          type: boolean
          description: Private.
          example: true
        OnlineTravelAgency:
          type: boolean
          description: Online travel agency.
          example: true
        GlobalDistributionSystem:
          type: boolean
          description: Global distribution system.
          example: true
        Marketing:
          type: boolean
          description: Marketing.
          example: true
        Inactive:
