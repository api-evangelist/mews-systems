        type: APIReference
      - url: https://api.mews.com/Swagger/distributor/swagger.yaml
        type: OpenAPI
        title: Mews-published Distributor Swagger (upstream source)
      - url: openapi/mews-booking-engine-api-openapi.yml
        type: OpenAPI
        title: Booking Engine (Distributor) API
      - url: https://docs.mews.com/booking-engine-guide/changelog
        type: ChangeLog
    description: >-
      The Mews Booking Engine API (historically published as the Distributor API and still served from the
      /api/distributor/v1 path) lets developers build custom guest-facing booking engines that create reservations
      directly in Mews. It is designed for front-end client consumption rather than server-to-server use, exposes
      enterprise configuration, availability, rate plans, products, vouchers and reservation creation, and is the
      foundation behind Mews-built and partner-built booking flows including widgets, kiosks, and direct-booking
      websites.
  - aid: mews-systems:mews-pos-api
    name: Mews POS API
    tags:
      - POS
      - Point of Sale
      - Orders
      - Restaurant
      - Bills
      - Hospitality
    humanURL: https://docs.mews.com/pos-api
    baseURL: https://api.mews.com/api/pos/v1
    properties:
      - url: https://docs.mews.com/pos-api
        type: Documentation
      - url: https://docs.mews.com/pos-api/guidelines
        type: Documentation
      - url: https://docs.mews.com/pos-api/operations
        type: APIReference
      - url: https://docs.mews.com/pos-api/changelog
        type: ChangeLog
    description: >-
      The Mews POS API gives partner point-of-sale systems real-time access to Mews POS data and services so that food
      and beverage, retail, and ancillary outlets can post charges to guest folios, share menus and product catalogues,
      manage table state, and reconcile orders with the property management system. Typical integrators include
      restaurant POS vendors, table-booking apps, inventory and stock-management systems, and F&B business-intelligence
      tools.
  - aid: mews-systems:mews-loyalty-partner-api
    name: Mews Loyalty Partner API
    tags:
      - Loyalty
      - Membership
      - Reverse API
      - Hospitality
    humanURL: https://docs.mews.com/loyalty-partner-api
    baseURL: https://partner.example.com
    properties:
      - url: https://docs.mews.com/loyalty-partner-api
        type: Documentation
    description: >-
      The Mews Loyalty Partner API is a reverse API — Mews calls endpoints that the loyalty provider hosts — used to
      integrate third-party loyalty and membership programs with Mews Operations. Loyalty partners implement the
      contract so that member lookup, enrollment, point accrual, and point redemption can happen automatically in the
      Mews reservation, check-in, and billing flow.
