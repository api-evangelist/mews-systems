    description: >-
      The Mews Connector API is the general-purpose Open API for Mews Operations. Partners use it to access enterprise
      configuration, reservations, customers, bills, payments, accounts, rates, products, restrictions, services,
      resources, and tasks across single properties or whole portfolios. Authentication uses a triple of Client (a
      free-form name for the calling application), ClientToken (issued by Mews to identify the partner application) and
      AccessToken (issued by the property to authorise the application against the enterprise). All operations are
      POST-based, return UTC timestamps, support pagination on multi-property lookups, and emit webhook-style events for
      near real-time integration. Use cases include kiosks, in-room tech, upsell engines, business intelligence,
      accounting reconciliation, and custom operational tooling.
  - aid: mews-systems:mews-channel-manager-api
    name: Mews Channel Manager API
    tags:
      - Channel Manager
      - Distribution
      - OTA
      - Availability
      - Rates
      - Inventory
      - Reservations
    humanURL: https://docs.mews.com/channel-manager-api
    baseURL: https://api.mews.com/api/channelManager/v1
    properties:
      - url: https://docs.mews.com/channel-manager-api
        type: Documentation
      - url: https://docs.mews.com/channel-manager-api/guidelines
        type: Documentation
      - url: https://docs.mews.com/channel-manager-api/operations
        type: APIReference
      - url: https://docs.mews.com/channel-manager-api/changelog
        type: ChangeLog
      - url: https://docs.mews.com/channel-manager-api/deprecations
        type: Documentation
    description: >-
      The Mews Channel Manager API is the two-way distribution surface between Mews and channel managers, online travel
      agents (OTAs), and other bulk sales channels. Mews pushes availability, rates, and inventory updates outbound to
      the channel manager, while the channel manager pushes new and modified reservations back into Mews. The API
      defines both Mews-side endpoints (consumed by the channel manager) and Channel Manager-side endpoints (consumed by
      Mews) so that pricing, restrictions, stop-sells, and reservation lifecycle stay in sync across all connected
      demand channels.
  - aid: mews-systems:mews-booking-engine-api
