description: >-
  Mews is a cloud-native hospitality cloud and property management system (PMS) headquartered in Prague, Czech Republic
  that powers reservations, operations, payments, point of sale, revenue management, and distribution for more than
  15,000 hospitality properties globally. The Mews Open API surface is organised into five product APIs — the
  general-purpose Connector API for partners working with Mews Operations data, the Channel Manager API for two-way
  distribution with OTAs and channel managers, the Booking Engine API for guest-facing reservation creation, the POS API
  for point-of-sale integrations, and the Loyalty Partner reverse API for membership systems. Mews also runs a
  marketplace of more than 1,000 hospitality integrations.
