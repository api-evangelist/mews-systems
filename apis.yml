  - type: Features
    data:
      - name: Cloud-Native Property Management System
        description: >-
          Reservation management, group bookings, guest check-in/out, housekeeping, billing, and accounting in a single
          hosted PMS
      - name: Point of Sale (POS)
        description: Embedded POS for hotel restaurants, bars, and ancillary outlets with charge posting to guest folios
      - name: Revenue Management System (RMS)
        description: Dynamic pricing, demand forecasting, and portfolio/group pricing with AI assistance
      - name: Integrated Payments
        description: Tokenization, multicurrency, automated reconciliation, and certified payment terminals
      - name: Open API Surface
        description: >-
          Five product APIs — Connector, Channel Manager, Booking Engine, POS, and Loyalty Partner — for partners and
          custom integrations
      - name: Webhook Events
        description: Connector API events feed for near real-time integration with reservation, customer, and billing state changes
      - name: Portfolio Access Tokens
        description: Single-token access across multiple properties for chain and enterprise integrations
      - name: Mews Marketplace
        description: >-
          1,000+ certified hospitality integrations spanning channel managers, OTAs, POS, payments, guest experience,
          BI, and operations
      - name: Booking Engine
        description: Direct-booking widgets and websites powered by the Booking Engine API
      - name: Business Intelligence and Analytics
        description: Reporting, KPI dashboards, and data exports for revenue, operations, and guest data
      - name: Security and Compliance
        description: SOC 2, ISO, and PCI DSS certified hosting and processing
      - name: Multi-Property and Multi-Brand Support
        description: Single Mews account spans many properties, brands, and legal entities under chain or enterprise structures
  - type: UseCases
    data:
      - name: Kiosk and Self Check-In
        description: Build self-service kiosks and mobile check-in flows on top of the Connector API
      - name: Custom Booking Engine
        description: Power direct-booking widgets and white-label websites with the Booking Engine API
      - name: OTA and Channel Manager Distribution
        description: >-
          Two-way sync of availability, rates, inventory, and reservations between Mews and OTAs via the Channel Manager
          API
      - name: Point of Sale Integration
        description: Post charges from restaurant, retail, spa, and activity POS to guest folios via the POS API
      - name: Loyalty Program Integration
        description: Plug a loyalty or membership program into the Mews reservation and folio lifecycle via the Loyalty Partner API
      - name: Business Intelligence and Reporting
        description: Pull reservation, revenue, and operations data into BI tools and data warehouses
      - name: Accounting and Finance Automation
        description: Reconcile bills, payments, and accounting categories with general-ledger and ERP systems
      - name: Guest Experience and Upsell
        description: Deliver pre-arrival upsell, in-stay messaging, and guest-app experiences using Connector API data and events
      - name: Operations and Housekeeping
        description: Drive housekeeping, maintenance, and task workflows with real-time room and reservation state
      - name: Fiscalization and Tax Reporting
        description: Report e-invoices to government tax authorities using the open-source Mews Fiscalizations .NET library
  - type: Integrations
    data:
      - name: Online Travel Agents
        description: Booking.com, Expedia, Airbnb, and other OTAs via certified channel managers using the Channel Manager API
      - name: Channel Managers
        description: SiteMinder, Cloudbeds, RateGain, D-EDGE and other channel managers via the Channel Manager API
      - name: Payment Processors
        description: Mews Payments plus integrations with Adyen, Stripe, and regional acquirers
      - name: Point of Sale Systems
        description: Mews POS plus third-party POS vendors integrated via the POS API
      - name: Business Intelligence
        description: Connector API feeds into Power BI, Tableau, Looker, and hospitality BI tools like HotelIQ and Demand Calendar
      - name: Guest Experience Apps
        description: Mobile check-in, messaging, upsell, and concierge apps built on the Connector API
      - name: Revenue Management
        description: Mews RMS plus third-party RMS vendors like Duetto, IDeaS, and Atomize integrated via the Connector API
      - name: Accounting and ERP
        description: General-ledger and ERP integrations including Xero, QuickBooks, NetSuite, and SAP via the Connector API
      - name: Door Locks and IoT
        description: Smart-lock and in-room device vendors integrated through the Connector API
      - name: Fiscalization Authorities
        description: Government e-invoice and fiscal reporting via the open-source Mews Fiscalizations .NET library
  - type: Solutions
    data:
      - name: Independent Hotels
        description: PMS, POS, payments, and booking engine for single-property independent hotels
      - name: Hotel Chains and Enterprise
        description: Multi-property, multi-brand operations with portfolio access tokens and central reporting
      - name: Hostels
        description: Bed-level inventory, group bookings, and self-service flows for hostels
      - name: Serviced Apartments and Extended Stay
        description: Long-stay billing, recurring charges, and apartment-style inventory
      - name: Motels and Limited Service
        description: Streamlined operations and self-service check-in for limited-service properties
