naftiko: 1.0.0-alpha2
info:
  label: Mews Connector API — Point of Sale Outlets
  description: 'Connector API — Point of Sale Outlets. 3 operations. Lead operation: Add Outlet Bills. Self-contained Naftiko capability covering one Mews business surface.'
  tags:
  - Mews
  - Connector
  - Point of Sale Outlets
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEWS_ACCESS_TOKEN: MEWS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: connector-pos
    baseUri: https://api.mews.com/api/connector/v1
    description: Mews Connector API — Point of Sale Outlets. Mews authentication (Client, ClientToken, AccessToken) is supplied in each JSON request body.
    authentication:
      type: bearer
      token: '{{env.MEWS_ACCESS_TOKEN}}'
    resources:
    - name: outlet-bills-add
      path: /outletBills/add
      operations:
      - name: outletBills_add
        method: POST
        description: Add Outlet Bills
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: JSON request body including Client, ClientToken and AccessToken authentication fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: outlet-items-get-all
      path: /outletItems/getAll
      operations:
      - name: outletItems_getAll
        method: POST
        description: Get All Outlet Items
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: JSON request body including Client, ClientToken and AccessToken authentication fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: outlets-get-all
      path: /outlets/getAll
      operations:
      - name: outlets_getAll
        method: POST
        description: Get All Outlets
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: JSON request body including Client, ClientToken and AccessToken authentication fields.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: connector-pos-rest
    port: 8080
    description: REST adapter for Mews Connector API — Point of Sale Outlets. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/outlet-bills-add
      name: outlet-bills-add
      description: REST surface for outlet-bills-add.
      operations:
      - method: POST
        name: outletBills_add
        description: Add Outlet Bills
        call: connector-pos.outletBills_add
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/outlet-items-get-all
      name: outlet-items-get-all
      description: REST surface for outlet-items-get-all.
      operations:
      - method: POST
        name: outletItems_getAll
        description: Get All Outlet Items
        call: connector-pos.outletItems_getAll
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/outlets-get-all
      name: outlets-get-all
      description: REST surface for outlets-get-all.
      operations:
      - method: POST
        name: outlets_getAll
        description: Get All Outlets
        call: connector-pos.outlets_getAll
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connector-pos-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mews Connector API — Point of Sale Outlets. One verb-noun tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: add-outlet-bills
      description: Add Outlet Bills
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: connector-pos.outletBills_add
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-outlet-items
      description: Get All Outlet Items
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connector-pos.outletItems_getAll
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-outlets
      description: Get All Outlets
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: connector-pos.outlets_getAll
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
