specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Mews
providerId: mews-systems
created: '2026-06-02'
modified: '2026-06-02'
reconciled: true
tags:
- Hospitality
- Property Management
- PMS
- Point of Sale
- Payments
description: >-
  Mews prices its hospitality cloud as tiered software subscriptions for properties (Essentials, Advanced,
  Enterprise) layered with usage-based add-on products (Revenue Management, Point of Sale, bookable services)
  and integrated payment processing fees. Open API access — the Connector, Channel Manager, and Booking Engine
  APIs — is bundled into the Enterprise tier, while the developer/partner program itself (sandbox access,
  certification) is free for approved integration partners; commercial terms for partners are arranged through
  the Mews Marketplace partnership program. Subscription pricing is quote-based (per-property / per-room) and
  is not published as fixed numbers on the public pricing page.
sources:
- https://www.mews.com/en/pricing
- https://www.mews.com/en/partners/new-partnerships
- https://docs.mews.com/getting-started/the-mews-apis
